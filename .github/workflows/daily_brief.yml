name: AI Daily Briefing

on:
  schedule:
    # 06:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
    # 08:00 AM IST (02:30 UTC)
    - cron: '30 2 * * *'
    # 10:00 AM IST (04:30 UTC)
    - cron: '30 4 * * *'
    # 12:00 PM IST (06:30 UTC)
    - cron: '30 6 * * *'
    # 03:00 PM IST (09:30 UTC)
    - cron: '30 9 * * *'
  workflow_dispatch: # Enable manual triggering in GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      # Required to push the updated daily_brief.db back to the repository
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Briefing Pipeline
        env:
          # Inject secrets configured in GitHub Repo Settings
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DB_TYPE: ${{ secrets.DB_TYPE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          LOG_LEVEL: INFO
          DATABASE_PATH: daily_brief.db
        run: |
          python -m app.main

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the database has modifications or is new
          if git status --porcelain daily_brief.db | grep -q .; then
            logger_info="auto-update article database [skip ci]"
            git add daily_brief.db
            git commit -m "chore: $logger_info"
            git push
          else
            echo "No changes detected in database. Skipping commit."
          fi
